<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>What game is this?</h1>
    <p>This is a light game when you click turn on light gets 
        turned on and when you click turn off the light gets turned off
    </p>
    <button onclick="document.getElementById('bulboff').src='bulb-on.svg'">Turn on</button>
    <img id="bulboff" src='bulb-off.svg' style="width: 100px;">
    <button onclick="document.getElementById('bulboff').src='bulb-off.svg'">Turn off</button>


</body>
