<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-200 min-h-screen flex justify-center items-center">

  <div class="bg-white w-96 p-6 rounded-xl shadow-lg">
    
    <h1 class="text-4xl font-bold text-center mb-6">
      Task Manager
    </h1>

    <div class="flex gap-2">
      
      <input
        type="text"
        placeholder="Enter a task"
        class="flex-1 border border-gray-300 rounded-lg px-3 py-2 outline-none"
      >

      <button
        class="bg-blue-500 text-white px-5 py-2 rounded-lg hover:bg-blue-600"
      >
        Add
      </button>

    </div>

  </div>

</body>
</html>
